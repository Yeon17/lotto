<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로또 번호 추천기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* DESIGN.md tokens */
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;
    --hairline: #e0e0e0;
    --divider-soft: #f0f0f0;
    --canvas: #ffffff;
    --parchment: #f5f5f7;
    --surface-pearl: #fafafc;
    --on-primary: #ffffff;

    --display-font: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    --text-font: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;

    --r-sm: 8px;
    --r-md: 11px;
    --r-lg: 18px;
    --r-pill: 9999px;

    /* exactly one system shadow, reserved for the lotto balls (the "product") */
    --product-shadow: rgba(0, 0, 0, 0.22) 0 3px 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--text-font);
    font-size: 17px;
    line-height: 1.47;
    letter-spacing: -0.374px;
    min-height: 100vh;
    background: var(--parchment);
    color: var(--ink);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 100%;
    max-width: 640px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: 48px 40px;
  }

  h1 {
    font-family: var(--display-font);
    text-align: center;
    font-size: 40px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.28px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: var(--text-font);
    text-align: center;
    color: var(--ink-muted-48);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    margin-bottom: 32px;
  }

  /* 탭 — 세그먼티드 컨트롤 */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .tab {
    flex: 1;
    padding: 11px 8px;
    text-align: center;
    border-radius: var(--r-pill);
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--hairline);
    font-family: var(--text-font);
    font-weight: 400;
    font-size: 14px;
    letter-spacing: -0.224px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease;
  }
  @media (min-width: 480px) {
    .tab { font-size: 17px; letter-spacing: -0.374px; padding: 11px; }
  }
  .tab.active {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }
  .tab:active { transform: scale(0.95); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* 컨트롤 */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  label {
    color: var(--ink-muted-80);
    font-size: 17px;
    letter-spacing: -0.374px;
  }

  select {
    font-family: var(--text-font);
    font-size: 17px;
    letter-spacing: -0.374px;
    color: var(--ink);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-pill);
    padding: 11px 20px;
    height: 44px;
    cursor: pointer;
  }
  select:focus-visible { outline: 2px solid var(--primary-focus); }

  button {
    font-family: var(--text-font);
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    border-radius: var(--r-pill);
    padding: 11px 22px;
    transition: transform 0.1s ease;
  }
  .btn-primary:active { transform: scale(0.95); }
  .btn-primary:focus-visible { outline: 2px solid var(--primary-focus); outline-offset: 2px; }

  .btn-secondary {
    background: transparent;
    color: var(--primary);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    border: 1px solid var(--primary);
    border-radius: var(--r-pill);
    padding: 11px 22px;
    transition: transform 0.1s ease;
  }
  .btn-secondary:active { transform: scale(0.95); }
  .btn-secondary:focus-visible { outline: 2px solid var(--primary-focus); outline-offset: 2px; }

  .results { display: flex; flex-direction: column; gap: 16px; }

  /* 게임 행 — 화이트 유틸리티 카드 */
  .game-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: 24px;
    animation: fadeIn 0.4s ease;
  }

  .game-label {
    font-family: var(--display-font);
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.374px;
    color: var(--ink);
    width: 28px;
    flex-shrink: 0;
  }

  .balls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .plus {
    font-size: 21px;
    font-weight: 400;
    color: var(--ink-muted-48);
    margin: 0 2px;
  }

  .ball {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--text-font);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.374px;
    color: var(--on-primary);
    box-shadow: var(--product-shadow);
    animation: pop 0.35s ease;
  }

  /* 보너스 공 — 하단 라벨로 구분 (장식 그림자/글로우 없음) */
  .bonus-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .bonus-wrap .bonus-label {
    font-size: 10px;
    line-height: 1;
    letter-spacing: -0.08px;
    color: var(--ink-muted-48);
  }

  /* 로또 공식 색상대 (플랫 컬러 — 콘텐츠로서의 제품 색상) */
  .c1 { background: #f9a825; } /* 1-10 노랑 */
  .c2 { background: #29b6f6; } /* 11-20 파랑 */
  .c3 { background: #ef5350; } /* 21-30 빨강 */
  .c4 { background: #757575; } /* 31-40 회색 */
  .c5 { background: #8bc34a; } /* 41-45 초록 */

  .empty {
    text-align: center;
    color: var(--ink-muted-48);
    padding: 32px 0;
    font-size: 17px;
    letter-spacing: -0.374px;
  }

  .footer {
    font-family: var(--text-font);
    text-align: center;
    color: var(--ink-muted-48);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.12px;
    line-height: 1.5;
    margin-top: 32px;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 역대 당첨번호 검색 입력 */
  .history-search {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .history-search input {
    flex: 1;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-pill);
    padding: 12px 20px;
    height: 44px;
    color: var(--ink);
    font-family: var(--text-font);
    font-size: 17px;
    letter-spacing: -0.374px;
  }
  .history-search input::placeholder { color: var(--ink-muted-48); }
  .history-search input:focus-visible { outline: 2px solid var(--primary-focus); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 460px;
    overflow-y: auto;
    padding-right: 6px;
  }
  .history-list::-webkit-scrollbar { width: 8px; }
  .history-list::-webkit-scrollbar-thumb {
    background: var(--hairline);
    border-radius: var(--r-pill);
  }

  /* 역대 카드 — 화이트 유틸리티 카드 */
  .draw-card {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: 24px;
    animation: fadeIn 0.3s ease;
  }
  .draw-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .draw-no {
    font-family: var(--display-font);
    font-weight: 600;
    font-size: 21px;
    letter-spacing: -0.374px;
    color: var(--ink);
  }
  .draw-no span { color: var(--primary); }
  .draw-date {
    color: var(--ink-muted-48);
    font-size: 14px;
    letter-spacing: -0.224px;
  }

  .draw-prize {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--divider-soft);
    font-size: 14px;
    letter-spacing: -0.224px;
  }
  .draw-prize .label { color: var(--ink-muted-48); }
  .draw-prize .amount {
    font-weight: 600;
    color: var(--ink);
    font-size: 17px;
    letter-spacing: -0.374px;
  }
  .draw-prize .winners { color: var(--ink-muted-48); margin-left: 8px; }

  /* 역대 카드의 작은 공 */
  .draw-card .ball {
    width: 38px;
    height: 38px;
    font-size: 14px;
    animation: none;
  }
  .draw-card .balls { gap: 8px; }

  .more-btn {
    margin-top: 24px;
    width: 100%;
    padding: 12px;
  }

  /* AI 운세 챗봇 */
  .chat-panel {
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--canvas);
  }
  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--divider-soft);
    background: var(--parchment);
  }
  .chat-header-title {
    font-family: var(--display-font);
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.374px;
    color: var(--ink);
  }
  .chat-header-desc {
    margin-top: 4px;
    font-size: 14px;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
  }
  .chat-messages {
    height: 380px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--surface-pearl);
  }
  .chat-messages::-webkit-scrollbar { width: 8px; }
  .chat-messages::-webkit-scrollbar-thumb {
    background: var(--hairline);
    border-radius: var(--r-pill);
  }
  .msg {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: var(--r-lg);
    font-size: 17px;
    line-height: 1.47;
    letter-spacing: -0.374px;
    animation: fadeIn 0.3s ease;
    word-break: keep-all;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    color: var(--ink);
  }
  .msg.user {
    align-self: flex-end;
    background: var(--primary);
    color: var(--on-primary);
  }
  .msg.error {
    align-self: flex-start;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    color: var(--ink-muted-80);
    font-size: 14px;
  }
  .msg.typing {
    color: var(--ink-muted-48);
    font-size: 14px;
    padding: 8px 16px;
    background: transparent;
    border: none;
  }
  .msg .fortune-balls {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--divider-soft);
  }
  .msg .fortune-balls .balls { gap: 8px; }
  .msg .fortune-balls .ball {
    width: 38px;
    height: 38px;
    font-size: 14px;
    animation: none;
  }
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
    background: var(--surface-pearl);
  }
  .quick-reply {
    background: var(--canvas);
    color: var(--primary);
    border: 1px solid var(--primary);
    border-radius: var(--r-pill);
    padding: 8px 14px;
    font-size: 14px;
    letter-spacing: -0.224px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .quick-reply:active { transform: scale(0.95); }
  .quick-reply:disabled { opacity: 0.4; cursor: default; }
  .chat-input-row {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--divider-soft);
    background: var(--canvas);
  }
  .chat-input-row input {
    flex: 1;
    border: 1px solid var(--hairline);
    border-radius: var(--r-pill);
    padding: 12px 20px;
    height: 44px;
    font-family: var(--text-font);
    font-size: 17px;
    letter-spacing: -0.374px;
    color: var(--ink);
    background: var(--canvas);
  }
  .chat-input-row input::placeholder { color: var(--ink-muted-48); }
  .chat-input-row input:focus-visible { outline: 2px solid var(--primary-focus); }
  .chat-input-row input:disabled { background: var(--parchment); }
  .chat-input-row .btn-primary { flex-shrink: 0; }
</style>
</head>
<body>
  <div class="container">
    <h1>로또 번호 추천기</h1>
    <p class="subtitle">로또 6/45 · 당첨 번호 6개 + 보너스 번호 1개</p>

    <div class="tabs">
      <div class="tab active" data-tab="recommend">번호 추천</div>
      <div class="tab" data-tab="chat">AI 운세</div>
      <div class="tab" data-tab="history">역대 1등</div>
    </div>

    <!-- 번호 추천 패널 -->
    <div class="panel active" id="panel-recommend">
      <div class="controls">
        <label for="count">게임 수</label>
        <select id="count">
          <option value="1">1게임</option>
          <option value="2">2게임</option>
          <option value="3">3게임</option>
          <option value="5" selected>5게임</option>
        </select>
        <button class="btn-primary" id="generateBtn">번호 추천 받기</button>
      </div>

      <div class="results" id="results">
        <p class="empty">버튼을 눌러 행운의 번호를 뽑아보세요!</p>
      </div>
    </div>

    <!-- AI 운세 챗봇 패널 -->
    <div class="panel" id="panel-chat">
      <div class="chat-panel">
        <div class="chat-header">
          <div class="chat-header-title">AI 운세 번호 상담</div>
          <div class="chat-header-desc">Gemini AI가 이름·생년월일·기분을 바탕으로 행운 번호를 추천해 드려요</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="quick-replies" id="quickReplies"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." autocomplete="off" />
          <button class="btn-primary" id="chatSendBtn">전송</button>
        </div>
      </div>
    </div>

    <!-- 역대 1등 번호 패널 -->
    <div class="panel" id="panel-history">
      <div class="history-search">
        <input type="number" id="drawSearch" min="1" placeholder="회차 검색 (예: 1227)" />
      </div>
      <div class="history-list" id="historyList"></div>
      <button class="btn-secondary more-btn" id="moreBtn">더 보기</button>
    </div>

    <p class="footer">
      추천 번호는 무작위·운세 기반으로 생성됩니다. 재미로만 즐겨주세요.
      역대 당첨번호는 공개 데이터 기준이며, 정확한 정보는 동행복권에서 확인하세요.
    </p>
  </div>

<script src="lotto_data.js"></script>
<script>
  const resultsEl = document.getElementById("results");
  const countEl = document.getElementById("count");
  const btn = document.getElementById("generateBtn");

  function colorClass(n) {
    if (n <= 10) return "c1";
    if (n <= 20) return "c2";
    if (n <= 30) return "c3";
    if (n <= 40) return "c4";
    return "c5";
  }

  function pickNumbers() {
    const pool = Array.from({ length: 45 }, (_, i) => i + 1);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const main = pool.slice(0, 6).sort((a, b) => a - b);
    const bonus = pool[6]; // 당첨 번호 6개를 제외한 나머지에서 1개
    return { main, bonus };
  }

  function render() {
    const games = parseInt(countEl.value, 10);
    resultsEl.innerHTML = "";
    for (let g = 0; g < games; g++) {
      const { main, bonus } = pickNumbers();
      const row = document.createElement("div");
      row.className = "game-row";

      const label = document.createElement("span");
      label.className = "game-label";
      label.textContent = String.fromCharCode(65 + g); // A, B, C...

      const balls = document.createElement("div");
      balls.className = "balls";
      main.forEach((n, idx) => {
        const ball = document.createElement("div");
        ball.className = "ball " + colorClass(n);
        ball.textContent = n;
        ball.style.animationDelay = (idx * 0.06) + "s";
        balls.appendChild(ball);
      });

      const plus = document.createElement("span");
      plus.className = "plus";
      plus.textContent = "+";
      balls.appendChild(plus);

      const bonusWrap = document.createElement("div");
      bonusWrap.className = "bonus-wrap";
      const bonusBall = document.createElement("div");
      bonusBall.className = "ball " + colorClass(bonus);
      bonusBall.textContent = bonus;
      bonusBall.style.animationDelay = (6 * 0.06) + "s";
      const bonusLabel = document.createElement("span");
      bonusLabel.className = "bonus-label";
      bonusLabel.textContent = "보너스";
      bonusWrap.appendChild(bonusBall);
      bonusWrap.appendChild(bonusLabel);
      balls.appendChild(bonusWrap);

      row.appendChild(label);
      row.appendChild(balls);
      resultsEl.appendChild(row);
    }
  }

  btn.addEventListener("click", render);

  /* ---------- 탭 전환 ---------- */
  const tabs = document.querySelectorAll(".tab");
  tabs.forEach((tab) => {
    tab.addEventListener("click", () => {
      tabs.forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      const name = tab.dataset.tab;
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      document.getElementById("panel-" + name).classList.add("active");
      if (name === "history" && historyList.childElementCount === 0) {
        renderHistory();
      }
      if (name === "chat" && !chatStarted) {
        startChat();
      }
    });
  });

  /* ---------- AI 운세 챗봇 (Gemini) ---------- */
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const chatSendBtn = document.getElementById("chatSendBtn");
  const quickRepliesEl = document.getElementById("quickReplies");

  let chatStarted = false;
  let chatBusy = false;
  let chatHistory = [];
  let fortuneDelivered = false;

  const MOOD_REPLIES = ["아주 좋아요", "보통이에요", "조금 지쳤어요", "행운이 필요해요"];

  function scrollChat() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function setInputEnabled(on) {
    chatInput.disabled = !on;
    chatSendBtn.disabled = !on;
  }

  function clearQuickReplies() {
    quickRepliesEl.innerHTML = "";
  }

  function showQuickReplies(options, handler) {
    clearQuickReplies();
    options.forEach((text) => {
      const btn = document.createElement("button");
      btn.className = "quick-reply";
      btn.type = "button";
      btn.textContent = text;
      btn.addEventListener("click", () => {
        if (chatBusy) return;
        handler(text);
      });
      quickRepliesEl.appendChild(btn);
    });
  }

  function addMessage(text, role) {
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.textContent = text;
    chatMessages.appendChild(el);
    scrollChat();
    return el;
  }

  function addBotMessage(text) {
    return addMessage(text, "bot");
  }

  function addUserMessage(text) {
    return addMessage(text, "user");
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "msg typing";
    el.id = "typingIndicator";
    el.textContent = "Gemini가 생각하는 중…";
    chatMessages.appendChild(el);
    scrollChat();
  }

  function hideTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  function ballsToHtml(main, bonus) {
    let html = '<div class="fortune-balls"><div class="balls">';
    main.forEach((n) => {
      html += '<div class="ball ' + colorClass(n) + '">' + n + "</div>";
    });
    html += '<span class="plus">+</span>';
    html += '<div class="bonus-wrap"><div class="ball ' + colorClass(bonus) + '">' + bonus +
      '</div><span class="bonus-label">보너스</span></div></div></div>';
    return html;
  }

  function addBotMessageWithBalls(text, main, bonus) {
    const el = document.createElement("div");
    el.className = "msg bot";
    const safeText = document.createElement("div");
    safeText.textContent = text;
    el.appendChild(safeText);
    el.insertAdjacentHTML("beforeend", ballsToHtml(main, bonus));
    chatMessages.appendChild(el);
    scrollChat();
  }

  function maybeShowMoodReplies(reply) {
    if (fortuneDelivered) return;
    if (/기분|느낌|컨디션/.test(reply) && !/행운.*키워드|키워드|숫자.*색/.test(reply)) {
      showQuickReplies(MOOD_REPLIES, (text) => handleUserInput(text));
    }
  }

  async function callGemini(options = {}) {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: chatHistory,
        start: options.start || false,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "API 요청 실패");
    return data;
  }

  async function sendToGemini(userText) {
    if (userText) {
      chatHistory.push({ role: "user", content: userText });
    }

    chatBusy = true;
    setInputEnabled(false);
    showTyping();

    try {
      const data = await callGemini({ start: !userText });
      hideTyping();

      if (userText) {
        // user message already shown
      } else if (data.reply) {
        // start message only
      }

      chatHistory.push({ role: "assistant", content: data.reply });

      if (data.numbers) {
        fortuneDelivered = true;
        addBotMessageWithBalls(data.reply, data.numbers.main, data.numbers.bonus);
        clearQuickReplies();
        showQuickReplies(["다시 상담받기"], () => resetChat());
        chatInput.placeholder = "아래 버튼으로 다시 시작할 수 있어요";
        setInputEnabled(false);
      } else {
        addBotMessage(data.reply);
        maybeShowMoodReplies(data.reply);
        setInputEnabled(true);
        chatInput.focus();
      }
    } catch (err) {
      hideTyping();
      addMessage("연결 오류: " + err.message + "\n(Vercel에 GEMINI_API_KEY가 설정되어 있는지 확인해 주세요)", "error");
      setInputEnabled(true);
    }

    chatBusy = false;
  }

  async function handleUserInput(text) {
    const trimmed = text.trim();
    if (!trimmed || chatBusy || fortuneDelivered) return;

    clearQuickReplies();
    addUserMessage(trimmed);
    chatInput.value = "";
    await sendToGemini(trimmed);
  }

  function resetChat() {
    chatHistory = [];
    fortuneDelivered = false;
    chatMessages.innerHTML = "";
    clearQuickReplies();
    chatInput.placeholder = "메시지를 입력하세요...";
    startChat();
  }

  async function startChat() {
    chatStarted = true;
    fortuneDelivered = false;
    chatHistory = [];
    setInputEnabled(false);
    await sendToGemini(null);
  }

  chatSendBtn.addEventListener("click", () => handleUserInput(chatInput.value));
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleUserInput(chatInput.value);
  });

  /* ---------- 역대 1등 번호 ---------- */
  const historyList = document.getElementById("historyList");
  const moreBtn = document.getElementById("moreBtn");
  const drawSearch = document.getElementById("drawSearch");

  // 최신 회차가 위로 오도록 정렬
  const HISTORY = (window.LOTTO_HISTORY || []).slice().sort((a, b) => b[0] - a[0]);
  const PAGE = 10;
  let shown = 0;

  function buildBalls(numbers, bonus) {
    const balls = document.createElement("div");
    balls.className = "balls";
    numbers.forEach((n) => {
      const ball = document.createElement("div");
      ball.className = "ball " + colorClass(n);
      ball.textContent = n;
      balls.appendChild(ball);
    });
    const plus = document.createElement("span");
    plus.className = "plus";
    plus.textContent = "+";
    balls.appendChild(plus);
    const bonusWrap = document.createElement("div");
    bonusWrap.className = "bonus-wrap";
    const bonusBall = document.createElement("div");
    bonusBall.className = "ball " + colorClass(bonus);
    bonusBall.textContent = bonus;
    const bonusLabel = document.createElement("span");
    bonusLabel.className = "bonus-label";
    bonusLabel.textContent = "보너스";
    bonusWrap.appendChild(bonusBall);
    bonusWrap.appendChild(bonusLabel);
    balls.appendChild(bonusWrap);
    return balls;
  }

  function formatKRW(amount) {
    // 억/만 단위 한글 표기 (예: 26억 7,480만원)
    const eok = Math.floor(amount / 100000000);
    const man = Math.floor((amount % 100000000) / 10000);
    let parts = [];
    if (eok > 0) parts.push(eok.toLocaleString() + "억");
    if (man > 0) parts.push(man.toLocaleString() + "만");
    if (parts.length === 0) parts.push(amount.toLocaleString());
    return parts.join(" ") + "원";
  }

  function drawCard(entry) {
    const [no, numbers, bonus, date, prize, winners] = entry;
    const card = document.createElement("div");
    card.className = "draw-card";

    const head = document.createElement("div");
    head.className = "draw-head";
    const noEl = document.createElement("div");
    noEl.className = "draw-no";
    noEl.innerHTML = "<span>" + no + "</span>회";
    const dateEl = document.createElement("div");
    dateEl.className = "draw-date";
    dateEl.textContent = date;
    head.appendChild(noEl);
    head.appendChild(dateEl);

    card.appendChild(head);
    card.appendChild(buildBalls(numbers, bonus));

    const prizeEl = document.createElement("div");
    prizeEl.className = "draw-prize";
    if (prize && prize > 0) {
      prizeEl.innerHTML =
        '<span class="label">1등 (1인당)</span>' +
        '<span><span class="amount">' + formatKRW(prize) + "</span>" +
        '<span class="winners">' + winners + "명 당첨</span></span>";
    } else {
      prizeEl.innerHTML =
        '<span class="label">1등 (1인당)</span>' +
        '<span class="winners">상금 정보 없음</span>';
    }
    card.appendChild(prizeEl);
    return card;
  }

  function renderHistory(reset = true) {
    if (reset) {
      historyList.innerHTML = "";
      shown = 0;
    }
    const next = HISTORY.slice(shown, shown + PAGE);
    next.forEach((e) => historyList.appendChild(drawCard(e)));
    shown += next.length;
    moreBtn.style.display = shown >= HISTORY.length ? "none" : "block";
  }

  moreBtn.addEventListener("click", () => renderHistory(false));

  drawSearch.addEventListener("input", () => {
    const q = drawSearch.value.trim();
    historyList.innerHTML = "";
    if (q === "") {
      moreBtn.style.display = "block";
      renderHistory();
      return;
    }
    moreBtn.style.display = "none";
    const found = HISTORY.find((e) => String(e[0]) === q);
    if (found) {
      historyList.appendChild(drawCard(found));
    } else {
      const empty = document.createElement("p");
      empty.className = "empty";
      empty.textContent = q + "회 정보를 찾을 수 없습니다.";
      historyList.appendChild(empty);
    }
  });
</script>
</body>
